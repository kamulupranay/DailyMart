 <section class="dashboard">
  <div class="card-grid">

    <!-- Card 1 -->
    <mat-card class="modern-card">
        <div class="modern-card-content">
        <img src="images/grocery.jpg" class="card-img" />
      <div class="card-header">
        <mat-icon>shopping_cart</mat-icon>
        <h3>Groceries</h3>
      </div>

      <p>
        Fresh produce, dairy, proteins, and all your daily essentials delivered fast.
      </p>

      <button matButton="outlined" color="primary" routerLink="/groceries">Shop Now</button>
      </div>
    </mat-card>

    <!-- Card 2 -->
    <mat-card class="modern-card">
        <div class="modern-card-content">
        <img src="images/shopping.jpg" class="card-img" />
      <div class="card-header">
        <mat-icon>shopping_bag</mat-icon>
        <h3>Shopping</h3>
      </div>

      <p>
        Discover trending products and shop directly with fewer steps.
      </p>

      <button matButton="outlined" color="primary" routerLink="/shopping">Shop Now</button>
      </div>
    </mat-card>

  </div>
</section>
